# lefthook.yml — Git hook configuration for ATDD quality gates
#
# Enforces quality gates locally before push, matching CI behaviour.
# Install: https://lefthook.dev  (or: npm i -g @evilmartians/lefthook)
# Activate: lefthook install
#
# Customise the commands below to match your project's scripts.
# The stack-specific blocks are commented out — uncomment the one that applies.

